<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numbered Sequence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --accent:      #2dd4a8;
            --accent-dim:  rgba(45,212,168,0.12);
            --accent-glow: rgba(45,212,168,0.3);
            --bg:          #090d16;
            --bg-card:     #0d1424;
            --bg-cell:     #111827;
            --border:      rgba(255,255,255,0.06);
            --text:        #e2e8f0;
            --text-muted:  #475569;
            --success:     #22c55e;
            --success-dim: rgba(34,197,94,0.15);
            --danger:      #ef4444;
            --danger-dim:  rgba(239,68,68,0.15);
            --mono:        'JetBrains Mono', monospace;
        }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Idle ── */
        #ns-idle {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .idle-title { font-size: 13px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); }
        .idle-sub   { font-size: 11px; color: rgba(255,255,255,0.15); font-family: var(--mono); }

        /* ── Container ── */
        #ns-container {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 12px 16px 10px;
            opacity: 0;
            transition: opacity 0.3s;
            gap: 8px;
            overflow: hidden;
        }

        /* ── Header ── */
        .ns-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 520px;
        }

        .ns-eyebrow {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
        }

        .ns-timers {
            display: flex;
            gap: 12px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-muted);
        }

        #ns-mem-timer,
        #ns-recall-timer {
            color: var(--text-muted);
            transition: color 0.3s;
        }

        #ns-recall-timer.urgent { color: var(--danger); }

        /* ── Grid Wrapper ── */
        .ns-grid-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            width: 100%;
            max-width: 520px;
            height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #ns-grid {
            display: grid;
            gap: 5px;
            width: 100%;
        }


        /* ── Cells ── */
        .ns-cell {
            background: var(--bg-cell);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: clamp(11px, 2vw, 24px);
            font-weight: 600;
            color: transparent;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
            user-select: none;
            aspect-ratio: 1;
            overflow: hidden;
        }

        .ns-cell:hover {
            background: rgba(45,212,168,0.08);
            border-color: var(--accent-dim);
        }

        .ns-cell.ns-revealed {
            background: var(--accent);
            border-color: var(--accent);
            color: #070a13;
            box-shadow: 0 0 12px var(--accent-glow);
            cursor: default;
        }

        .ns-cell.ns-revealed-hint {
            background: rgba(45,212,168,0.2);
            border-color: var(--accent-dim);
            color: var(--accent);
        }

        .ns-cell.ns-correct {
            background: var(--success);
            border-color: var(--success);
            color: #070a13;
            cursor: default;
            transform: scale(0.96);
        }

        .ns-cell.ns-wrong {
            background: var(--danger);
            border-color: var(--danger);
            color: #fff;
            cursor: default;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25%      { transform: translateX(-4px); }
            75%      { transform: translateX(4px); }
        }

        /* ── Footer ── */
        .ns-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 520px;
            gap: 12px;
            flex-shrink: 0;
        }

        #ns-round-label {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .ns-message {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-muted);
            flex: 1;
            text-align: center;
        }

        .ns-message.ns-msg-success { color: var(--success); font-weight: 600; }
        .ns-message.ns-msg-failure { color: var(--danger);  font-weight: 600; }

        #ns-retry-hint {
            display: none;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        #ns-retry-hint strong { color: var(--accent); }
    </style>
</head>
<body>

<div id="ns-idle">
    <div class="idle-title">Numbered Sequence</div>
    <div class="idle-sub">Awaiting signal…</div>
</div>

<div id="ns-container">

    <div class="ns-header">
        <div class="ns-eyebrow">Numbered Sequence</div>
        <div class="ns-timers">
            <span id="ns-mem-timer"></span>
            <span id="ns-recall-timer"></span>
        </div>
    </div>

    <div class="ns-grid-wrap">
        <div id="ns-grid"></div>
    </div>

    <div class="ns-footer">
        <span id="ns-round-label">ROUND: 1/3</span>
        <span id="ns-message" class="ns-message">Memorize the sequence</span>
        <span id="ns-retry-hint"><strong>[SPACE]</strong> retry</span>
    </div>

</div>

<script src="numberedSequence.js"></script>
</body>
</html>
